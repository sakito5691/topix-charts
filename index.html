<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャートボード</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
        }
        h1 {
            font-size: 16px;
            text-align: center;
            margin: 10px 0;
            color: #2962ff;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
        }
        .chart-box {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            height: 200px; /* チャートが収まる高さ */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .chart-title {
            font-weight: bold;
            font-size: 12px;
            color: #00ffcc;
            margin-bottom: 3px;
        }
        .widget-target {
            width: 100%;
            flex-grow: 1;
        }
        .base-market {
            grid-column: 1 / -1;
            height: 240px;
            border: 1px solid #2962ff;
        }
        .base-market .chart-title { color: #2962ff; }
    </style>
</head>
<body>

    <h1>TOPIX 業種別相対チャートボード</h1>

    <div class="grid-container">
        <!-- 各セクターの箱（ここに下のプログラムからチャートを注入します） -->
        <div class="chart-box base-market"><div class="chart-title">📈 TOPIX (日足基準)</div><div id="tv-topix" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">銀行</div><div id="tv-sec1" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">証券</div><div id="tv-sec2" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">保険</div><div id="tv-sec3" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">その他金融</div><div id="tv-sec4" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">繊維</div><div id="tv-sec5" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">パルプ紙</div><div id="tv-sec6" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">ガラス土石</div><div id="tv-sec7" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">鉄鋼</div><div id="tv-sec8" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">非鉄金属</div><div id="tv-sec9" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">金属製品</div><div id="tv-sec10" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">鉱業</div><div id="tv-sec11" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">石油石炭</div><div id="tv-sec12" class="widget-target"></div></div>
        <div class="chart-box"><div class="chart-title">卸売</div><div id="tv-sec13" class="widget-target"></div></div>
    </div>

    <!-- チャートを自動生成するパーツ（最新のスマホ・PC両対応版） -->
    <script type="text/javascript" src="https://tradingview.com"></script>
    <script type="text/javascript">
        function loadChart(containerId, symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Tokyo",
                "theme": "dark",
                "style": "3", /* エリア（面）チャートで強弱を見やすく */
                "locale": "ja",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": containerId
            });
        }

        // ページ読み込み完了時に一斉にチャートを生成
        window.onload = function() {
            loadChart("tv-topix", "TSE:1305");
            loadChart("tv-sec1", "TSE:1615/TSE:1305");
            loadChart("tv-sec2", "TSE:1617/TSE:1305");
            loadChart("tv-sec3", "TSE:1618/TSE:1305");
            loadChart("tv-sec4", "TSE:1619/TSE:1305");
            loadChart("tv-sec5", "TSE:1621/TSE:1305");
            loadChart("tv-sec6", "TSE:1622/TSE:1305");
            loadChart("tv-sec7", "TSE:1624/TSE:1305");
            loadChart("tv-sec8", "TSE:1626/TSE:1305");
            loadChart("tv-sec9", "TSE:1627/TSE:1305");
            loadChart("tv-sec10", "TSE:1628/TSE:1305");
            loadChart("tv-sec11", "TSE:1611/TSE:1305");
            loadChart("tv-sec12", "TSE:1612/TSE:1305");
            loadChart("tv-sec13", "TSE:1629/TSE:1305");
        };
    </script>
</body>
</html>
