<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャートボード</title>
    <style>
        body {
            background-color: #121212; /* 背景を黒にして視認性をアップ */
            margin: 0;
            padding: 5px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* スマホ画面で綺麗に2列に並べる */
            gap: 5px;
        }
        .chart-card {
            background-color: #ffffff;
            border-radius: 4px;
            overflow: hidden;
            display: block;
        }
        /* TOPIX単体（最上部）だけ1列ぶち抜きで大きく表示 */
        .base-market {
            grid-column: span 2;
        }
        /* チャート画像そのものを枠内にピッタリ収める設定 */
        img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- 【基準】TOPIX単体（最上部） -->
        <div class="chart-card base-market">
            <img src="https://kabumap.com">
        </div>
        
        <!-- 13セクターの相対チャート画像を直接1面表示（TOPIXが0%基準の水平線になります） -->
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
        <div class="chart-card"><img src="https://kabumap.com"></div>
    </div>

</body>
</html>
