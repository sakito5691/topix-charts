<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャートボード</title>
    <style>
        body {
            background-color: #131722; /* TradingViewの標準ダーク背景色 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
        }
        h1 {
            font-size: 16px;
            text-align: center;
            margin: 10px 0;
            color: #2962ff;
        }
        .grid-container {
            display: grid;
            /* スマホで横並び2列、PCなどの大画面では自動で3〜4列に広がる設定 */
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
        }
        .chart-card {
            background-color: #1c2030;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2a2e39;
            height: 220px; /* 各カードの縦幅 */
            padding: 5px;
            box-sizing: border-box;
        }
        .chart-label {
            font-size: 12px;
            font-weight: bold;
            padding: 3px 5px;
            color: #00ffcc;
            background: #2a2e39;
            border-radius: 3px;
            margin-bottom: 5px;
            text-align: center;
        }
        .base-market {
            grid-column: 1 / -1; /* 最上部のTOPIX本体だけ横幅いっぱいに表示 */
            height: 260px;
            border: 1px solid #2962ff;
        }
        iframe {
            width: 100%;
            height: calc(100% - 25px); /* タイトル下の残り幅いっぱいにチャート画像を描画 */
            border: none;
        }
    </style>
</head>
<body>

    <h1>TOPIX 業種別相対チャート</h1>

    <div class="grid-container">
        <!-- 【基準】TOPIX単体（最上部） -->
        <div class="chart-card base-market">
            <div class="chart-label">📈 TOPIX (日足基準)</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>
        
        <!-- 13セクターの相対（割り算）チャート一覧。すべて画像形式で埋め込み -->
        <div class="chart-card">
            <div class="chart-label">銀行</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">証券</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">保険</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">その他金融</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">繊維</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">パルプ紙</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">ガラス土石</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">鉄鋼</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">非鉄金属</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">金属製品</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">鉱業</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">石油石炭</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>

        <div class="chart-card">
            <div class="chart-label">卸売</div>
            <iframe src="https://tradingview.com"></iframe>
        </div>
    </div>

</body>
</html>
