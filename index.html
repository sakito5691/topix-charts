<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャートボード</title>
    <style>
        body {
            background-color: #121212; /* 世界の株価風の黒背景 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
        }
        h1 {
            font-size: 18px;
            text-align: center;
            margin: 10px 0;
            color: #2962ff;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* スマホで綺麗に並ぶ2列構成 */
            gap: 8px;
            margin-top: 10px;
        }
        .chart-box {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 60px;
            box-sizing: border-box;
        }
        /* タップした時に一瞬色が変わるスマホ用設定 */
        .chart-box:active {
            background-color: #3a3a3c;
        }
        .chart-title {
            font-weight: bold;
            font-size: 14px;
        }
        .sub-title {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
        }
        /* 基準となるTOPIXだけ最上部に大きく配置 */
        .base-market {
            grid-column: span 2;
            background-color: #1c2030;
            border: 1px solid #2962ff;
            min-height: 70px;
        }
        .base-market .chart-title {
            color: #2962ff;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <h1>TOPIX 業種別相対チャート</h1>

    <div class="grid-container">

        <!-- 【基準】TOPIX単体のチャート（最上部に大きく表示） -->
        <a href="https://tradingview.com" class="chart-box base-market" target="_blank">
            <div class="chart-title">📈 TOPIX (日足基準)</div>
            <div class="sub-title">TSE:1305</div>
        </a>

        <!-- 各セクターの割り算チャート（タップで公式の動く相対チャートへジャンプ） -->
        <a href="https://tradingview.com" class="chart-box" target="_blank">
            <div class="chart-title">銀行</div>
            <div class="sub-title">1615 / TOPIX</div>
        </a>

</body>
</html>
