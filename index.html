<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャートボード</title>
    <style>
        body {
            background-color: #121212; /* 世界の株価風の黒背景 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
        }
        h1 {
            font-size: 16px;
            text-align: center;
            margin: 10px 0;
            color: #2962ff;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
        }
        .chart-card {
            background-color: #1c1c1e;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2c2c2e;
            height: 240px; /* チャートが綺麗に収まる高さ */
            padding: 5px;
            box-sizing: border-box;
        }
        .chart-label {
            font-size: 12px;
            font-weight: bold;
            padding: 3px 5px;
            color: #00ffcc;
            background: #2a2e39;
            border-radius: 3px;
            margin-bottom: 5px;
            text-align: center;
        }
        .base-market {
            grid-column: 1 / -1; /* 最上部のTOPIX本体だけ横幅いっぱいに表示 */
            height: 280px;
            border: 1px solid #2962ff;
        }
        .base-market .chart-label { color: #2962ff; }
        iframe {
            width: 100%;
            height: calc(100% - 25px);
            border: none;
            background-color: #ffffff; /* チャートを見やすくするため背景を白に */
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>TOPIX 業種別相対チャート</h1>

    <div class="grid-container">
        <!-- 【基準】TOPIX単体（最上部） -->
        <div class="chart-card base-market">
            <div class="chart-label">📈 TOPIX (日足基準)</div>
            <iframe src="https://infocast.co.jp"></iframe>
        </div>
        
        <!-- 13セクターのチャート一覧（3ヶ月間の日足チャートが自動で並びます） -->
        <div class="chart-card"><div class="chart-label">銀行</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">証券</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">保険</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">その他金融</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">繊維</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">パルプ紙</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">ガラス土石</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">鉄鋼</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">非鉄金属</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">金属製品</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">鉱業</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">石油石炭</div><iframe src="https://infocast.co.jp"></iframe></div>
        <div class="chart-card"><div class="chart-label">卸売</div><iframe src="https://infocast.co.jp"></iframe></div>
    </div>

</body>
</html>
