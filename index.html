<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIX 業種別相対チャート</title>
    <style>
        body { background-color: #131722; color: #ffffff; font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { font-size: 18px; text-align: center; color: #2962ff; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
        .chart-card { background-color: #1c2030; border-radius: 6px; padding: 5px; text-align: center; }
        .chart-label { font-size: 12px; color: #00ffcc; margin-bottom: 5px; }
        .chart-img { width: 100%; height: auto; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>TOPIX 業種別相対チャート</h1>
    <div class="grid-container">
        <!-- チャート画像URLを直接埋め込み -->
        <div class="chart-card"><div class="chart-label">銀行</div><img class="chart-img" src="https://tradingview.com"></div>
        <div class="chart-card"><div class="chart-label">証券</div><img class="chart-img" src="https://tradingview.com"></div>
        <!-- 他のセクターも同様に設定可能 -->
    </div>
</body>
</html>
